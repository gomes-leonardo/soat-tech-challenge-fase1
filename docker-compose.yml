version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: soat-db
    environment:
      POSTGRES_DB: soat_repair_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soat-app
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: soat_repair_shop
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: docker-secret-change-in-production
      JWT_EXPIRES_IN: 1h
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
